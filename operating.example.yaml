# operating.yaml --- 描述本次仿真运行的参数(运行属性,与某一次工作点绑定)
#
# 同一晶体可以有多份 operating.yaml 跑不同工作点:
#   bias_2500V.yaml, bias_3000V.yaml, bias_sweep_3500V.yaml, ...
#
# 命令行调用示例:
#   python run.py detector_A.step --op bias_2500V.yaml
#   python run.py detector_A.step --op bias_2500V.yaml --voltage NPlus_01=2800
#
# 单位约定: 电压一律 V, 长度一律 mm。

# ─────────────────────────────────────────────────────────────────────
# 各电极电压 (V, 浮点数)
# ─────────────────────────────────────────────────────────────────────
#
# 优先级 (高 → 低):
#   1. CLI 的 --voltage NAME=V
#   2. voltages: 段显式赋值
#   3. defaults: 段通配符匹配
#
# 校验: Maxwell 模型里每个非 Crystal 的 body 都必须有电压。
#       缺失任何电极 → abort 并列出缺失项。
voltages:
  PPlus_01: 0
  NPlus_01: 2500

  # 多电极示例:
  # NPlus_02: 2500
  # NPlus_03: 2500
  # ...
  # NPlus_36: 2500

# ─────────────────────────────────────────────────────────────────────
# 通配符默认值。被上面 voltages: 段显式值覆盖。
# 多电极分段时极其方便: 一行写完 36 段共偏压。
# ─────────────────────────────────────────────────────────────────────
defaults:
  "PPlus_*": 0
  "NPlus_*": 2500

# ─────────────────────────────────────────────────────────────────────
# 网格 (用于 .h5 字段导出)
# ─────────────────────────────────────────────────────────────────────
grid:
  # 各向同性步长 (mm)。0.5mm 是 HPGe 仿真事实标准。
  # 快速 sanity check 可用 1.0;研究电极尖端细节可用 0.25。
  # 取值范围: [0.05, 5.0]
  step_mm: 0.5

  # bbox 外余量 (mm)。grid 覆盖 Crystal 包围盒 + 此余量。
  # 取值范围: [0.0, 10.0]
  padding_mm: 0.5

# ─────────────────────────────────────────────────────────────────────
# 可选: 覆盖默认输出根目录 (默认 ./data_out)
# ─────────────────────────────────────────────────────────────────────
# output_root: /custom/path
